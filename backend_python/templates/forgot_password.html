{% extends "base.html" %}

{% block content %}
<div class="glass-panel p-8 max-w-sm w-full animate-in fade-in duration-300">
    <div class="text-center mb-6">
        <h2 class="text-2xl font-bold text-white mb-2">Forgot Password</h2>
        <p class="text-sm text-gray-400">Enter your email address and we'll send you a link to reset your password.</p>
    </div>

    <form method="POST" action="/forgot_password" class="space-y-4">
        <div>
            <label class="block text-sm font-semibold text-gray-400 mb-2">Email Address</label>
            <input type="email" name="email" class="input-field w-full p-3" placeholder="name@example.com" required autofocus>
        </div>
        <button type="submit" class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-3 rounded-xl transition-all shadow-lg transform hover:-translate-y-0.5 mt-4">
            Send Reset Link
        </button>
        <div class="text-center mt-4 pt-4 border-t border-gray-700/50">
            <a href="/login" class="text-sm text-gray-400 hover:text-white transition-colors">← Back to Login</a>
        </div>
    </form>
</div>
{% endblock %}
