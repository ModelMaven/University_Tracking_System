{% extends "base.html" %}

{% block content %}
<div class="glass-panel p-8 max-w-sm w-full animate-in fade-in duration-300">
    <div class="text-center mb-6">
        <h2 class="text-2xl font-bold text-white mb-2">Set New Password</h2>
        <p class="text-sm text-gray-400">Please enter your new secure password below.</p>
    </div>

    <form method="POST" action="/reset_password/{{ token }}" class="space-y-4">
        <div>
            <label class="block text-sm font-semibold text-gray-400 mb-2">New Password</label>
            <input type="password" name="password" class="input-field w-full p-3" placeholder="••••••••" required autofocus minlength="6">
        </div>
        <button type="submit" class="w-full bg-gradient-to-r from-emerald-600 to-green-600 hover:from-emerald-500 hover:to-green-500 text-white font-bold py-3 rounded-xl transition-all shadow-lg transform hover:-translate-y-0.5 mt-4">
            Save Password
        </button>
    </form>
</div>
{% endblock %}
